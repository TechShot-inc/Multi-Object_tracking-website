name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-typecheck-test:
    name: Lint, typecheck, test (Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build mot-tests image
        run: docker compose -f docker/compose.yml build mot-tests

      - name: Ruff format (check)
        run: docker compose -f docker/compose.yml run --rm mot-tests ruff format --check src tests

      - name: Ruff lint
        run: docker compose -f docker/compose.yml run --rm mot-tests ruff check src tests

      - name: Pyright
        run: docker compose -f docker/compose.yml run --rm mot-tests pyright

      - name: Pytest
        run: docker compose -f docker/compose.yml run --rm mot-tests pytest -q tests

  security:
    name: Security scans (Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Secret scan (gitleaks)
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            zricethezav/gitleaks:v8.30.1 \
            detect --source=/repo --no-git --redact --config=/repo/.gitleaks.toml

      - name: Build mot-tests image
        run: docker compose -f docker/compose.yml build mot-tests

      - name: Dependency vulnerability scan (pip-audit)
        run: docker compose -f docker/compose.yml run --rm mot-tests pip-audit --skip-editable --ignore-vuln CVE-2026-4539
