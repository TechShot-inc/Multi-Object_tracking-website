<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        .video-container {
            width: 100%;
            margin: 20px 0;
        }
        video {
            width: 100%;
            max-height: 70vh;
            background-color: black;
        }
        .controls {
            margin: 20px 0;
        }
        button {
            padding: 10px 15px;
            margin-right: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #2196F3;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Video Player</h1>
        
        <div class="video-container">
            <!-- HTML5 Video Player -->
            <video id="videoPlayer" controls>
                <source id="videoSource" src="{{ video_url }}" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        
        <div class="controls">
            <button onclick="document.getElementById('videoPlayer').play()">Play</button>
            <button onclick="document.getElementById('videoPlayer').pause()">Pause</button>
            <button onclick="document.getElementById('videoPlayer').currentTime = 0">Restart</button>
            <button onclick="toggleFullScreen()">Fullscreen</button>
        </div>
        
        <div>
            <p>If the video doesn't play above, you can <a href="{{ video_url }}" download>download it</a> to watch locally.</p>
        </div>
        
        <a href="/" class="back-link">← Back to Home</a>
    </div>

    <script>
        function toggleFullScreen() {
            const video = document.getElementById('videoPlayer');
            if (!document.fullscreenElement) {
                if (video.requestFullscreen) {
                    video.requestFullscreen();
                } else if (video.webkitRequestFullscreen) { /* Safari */
                    video.webkitRequestFullscreen();
                } else if (video.msRequestFullscreen) { /* IE11 */
                    video.msRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) { /* Safari */
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) { /* IE11 */
                    document.msExitFullscreen();
                }
            }
        }
        
        // Add event listeners for video errors
        document.getElementById('videoPlayer').addEventListener('error', function(e) {
            console.error('Video error:', e);
            alert('Error loading video. Please try downloading instead.');
        });
    </script>
</body>
</html>
