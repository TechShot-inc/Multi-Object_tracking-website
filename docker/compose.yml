# Multi-Object Tracking - Docker Compose Configuration
# Usage:
#   Development: docker compose -f docker/compose.yml up
#   Production:  docker compose -f docker/compose.yml --profile prod up

services:
  # Development service with hot-reload
  mot-web-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mot-web-dev
    ports:
      - "5000:5000"
    environment:
      - ENV=dev
      - HOST=0.0.0.0
      - PORT=5000
      - SECRET_KEY=dev-only-change-me
      - MAX_UPLOAD_MB=512
    volumes:
      # Mount source for hot-reload during development
      - ../src:/app/src:ro
      # Persist uploads and results
      - mot-uploads:/app/var/uploads
      - mot-results:/app/var/results
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Production service
  mot-web-prod:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mot-web-prod
    profiles:
      - prod
    ports:
      - "5000:5000"
    environment:
      - ENV=prod
      - HOST=0.0.0.0
      - PORT=5000
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required for production}
      - MAX_UPLOAD_MB=512
    volumes:
      - mot-uploads:/app/var/uploads
      - mot-results:/app/var/results
    restart: always
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mot-uploads:
    name: mot-uploads
  mot-results:
    name: mot-results
